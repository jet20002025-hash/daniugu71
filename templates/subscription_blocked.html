<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>开通服务 - 强势股筛选器</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .block-box { max-width: 480px; margin: 80px auto; padding: 32px; background: var(--panel-light); border: 1px solid var(--border); border-radius: 18px; text-align: center; }
    .block-box h1 { font-size: 24px; margin-bottom: 16px; }
    .block-box p { color: var(--muted); margin-bottom: 12px; }
    .block-box .primary { margin-top: 16px; }
    .contact-box { margin-top: 20px; padding: 16px; background: rgba(47, 196, 178, 0.08); border: 1px solid var(--border); border-radius: 12px; text-align: left; }
    .contact-box p { margin: 0 0 8px; font-size: 14px; }
    .contact-box .wx { font-size: 18px; font-weight: 700; color: var(--accent-2); letter-spacing: 0.02em; }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <main class="container">
    <div class="block-box">
      <h1>服务已到期</h1>
      <p>您的免费试用已结束，或付费会员已到期。需要继续使用筛选与评分功能，请先续费开通。</p>
      <p>当前账号：<strong>{{ user.username }}</strong></p>
      <div class="contact-box">
        <p>续费请联系微信：</p>
        <p class="wx">{{ renewal_wechat }}</p>
        <p>{{ renewal_hint }}</p>
      </div>
      <a href="{{ url_for('logout') }}" class="primary" style="display:inline-block;text-decoration:none">退出登录</a>
    </div>
  </main>
</body>
</html>
